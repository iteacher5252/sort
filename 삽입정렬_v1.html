<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삽입 정렬 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght=400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        
        :root { --speed: 1200ms; }
        
        .stage { background: #0f172a; border-radius: 3rem; height: 420px; position: relative; width: 100%; max-width: 1000px; margin: 0 auto; overflow: hidden; box-shadow: inset 0 0 60px rgba(0,0,0,0.6); }
        
        /* 💡 카드 기본 모션 (부드러운 하드웨어 가속 유지) */
        .card-visual { 
            width: 70px; height: 100px; background: white; border-radius: 12px; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 8px; font-weight: 900; 
            position: absolute; bottom: 130px; 
            will-change: left, transform, background-color, border-color;
            transform: translate3d(0, 0, 0);
            transition: transform var(--speed) cubic-bezier(0.25, 1, 0.4, 1), 
                        left var(--speed) cubic-bezier(0.25, 1, 0.4, 1), 
                        background-color 0.3s ease, border-color 0.3s ease;
            border: 2px solid #e2e8f0; box-shadow: 0 10px 15px rgba(0,0,0,0.3); z-index: 10; 
        }
        
        .card-val { font-size: 1.5rem; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .card-suit { font-size: 11px; font-weight: 800; line-height: 1; }
        
        .theme-black { color: #1e293b !important; }
        .theme-red { color: #dc2626 !important; }
        
        .key-card { transform: translate3d(0, -120px, 0) scale(1.05) !important; z-index: 100 !important; border-color: #f59e0b !important; box-shadow: 0 15px 25px rgba(245, 158, 11, 0.4); }
        .comparing { transform: translate3d(0, -20px, 0) !important; border-color: #38bdf8 !important; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
        .shifting { transform: translate3d(0, -20px, 0) !important; border-color: #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        
        /* 완료된 카드를 싱그러운 연한 초록색(emerald) 느낌으로 설정 */
        .sorted { background: #ecfdf5 !important; color: #047857 !important; border-color: #a7f3d0 !important; transform: translate3d(0, 0, 0) scale(1) !important; z-index: 5 !important; }
        
        .slot { position: absolute; width: 70px; height: 100px; bottom: 130px; border: 2px dashed #334155; border-radius: 12px; z-index: 1; }
        
        /* 💡 로그박스 내부 폰트를 Pretendard 통합 서체 및 font-medium(500)으로 부드럽게 조정 */
        .log-box { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 500; height: 420px; overflow-y: auto; background: white; padding: 20px; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); scroll-behavior: smooth; }
        
        .analysis-table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; border-radius: 1.5rem; overflow: hidden; }
        .analysis-table th { background: #f8fafc; color: #64748b; font-weight: 700; padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: center; }
        .analysis-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        
        /* 단계 표시 태그 스타일 */
        .step-tag { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 8px; font-weight: 800; border: 1px solid #e2e8f0; }
        .step-tag.init { background: #f8fafc; color: #64748b; }
        .step-tag.final { background: #dcfce7; color: #15803d; border-color: #bbf7d0; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1240px] mx-auto">
        <header class="mb-6 bg-white p-6 rounded-[2.5rem] shadow-sm flex flex-wrap lg:flex-nowrap justify-between items-center gap-6">
            <div class="w-full lg:w-auto">
                <h1 class="text-2xl font-black text-slate-900 mb-1">🃏 삽입 정렬 시뮬레이터</h1>
                <p class="text-slate-500 text-sm pl-9 pt-3">1. 두번째 값부터 시작한다. <br> 2. 빈 위치에 카드를 넣는다!</p>
                
                <div class="flex items-center gap-2 mt-3" id="suitBtnArea">
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-4 bg-slate-50 p-4 rounded-2xl w-full lg:w-auto justify-between lg:justify-end">
                <div class="flex flex-col gap-1 min-w-[200px]">
                    <span class="text-[10px] font-bold text-slate-400">커스텀 데이터 입력 (중복 불가)</span>
                    <input type="text" id="customNumbers" value="8, 4, 1, 9, 7" placeholder="예: 5, 2, 9, 1, 7" class="px-3 py-1.5 text-xs font-bold font-mono rounded-lg border border-slate-300 focus:outline-none focus:border-indigo-500 w-full">
                    <span id="errorMsg" class="text-[10px] text-red-500 font-bold hidden">⚠️ 중복된 수치가 포함되어 있습니다!</span>
                </div>
                
                <div class="flex gap-4 border-r border-slate-200 pr-4 text-center">
                    <div>
                        <span class="block text-[10px] font-bold text-slate-400">총 비교</span>
                        <span id="totalCompScore" class="text-xl font-black text-amber-500">0</span>
                    </div>
                    <div>
                        <span class="block text-[10px] font-bold text-slate-400">총 이동(Move)</span>
                        <span id="totalMoveScore" class="text-xl font-black text-blue-500">0</span>
                    </div>
                </div>
                
                <div class="flex flex-col gap-1">
                    <span class="text-[10px] font-bold text-slate-400">속도 제어: <span id="speedVal" class="text-indigo-600">느리게 (1200ms)</span></span>
                    <input type="range" id="speedRange" min="300" max="1500" step="50" value="1200" oninput="changeSpeed()" class="w-32 accent-indigo-600">
                </div>
                
                <div class="flex gap-1.5 pl-2">
                    <button id="startBtn" onclick="handleStart()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3.5 py-2 rounded-xl font-bold transition text-xs shadow-md">시작</button>
                    <button id="pauseBtn" onclick="handlePause()" class="bg-amber-500 hover:bg-amber-600 text-white px-3.5 py-2 rounded-xl font-bold transition text-xs shadow-md" disabled>일시중지</button>
                    <button id="resetBtn" onclick="handleReset()" class="bg-slate-600 hover:bg-slate-700 text-white px-3.5 py-2 rounded-xl font-bold transition text-xs shadow-md">초기화</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
            <div class="lg:col-span-3 stage" id="stage"></div>
            <div class="log-box" id="logBox">
                <div class="text-slate-400 font-bold italic">시작 버튼을 누르면 작동합니다.</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
            <h3 class="text-base font-extrabold text-slate-800 mb-3">📊 단계별 정렬 데이터 실시간 기록</h3>
            <table class="analysis-table">
                <thead>
                    <tr>
                        <th width="140">진행 단계</th>
                        <th>정렬 상태 데이터 흐름 (파란색: 정렬 완료 영역 / 밑줄: 기준값)</th>
                        <th width="140">회차별 비교 (누적)</th>
                        <th width="140">회차별 이동 (누적)</th>
                    </tr>
                </thead>
                <tbody id="analysisBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let cardElements = [];
        let isRunning = false;
        let isPaused = false;
        let pauseResolve = null;
        
        let globalComp = 0;
        let globalMove = 0;
        
        let startX = 40;
        let gap = 105;
        
        const suits = [
            { symbol: '♠', name: '스페이드', color: 'black' },
            { symbol: '◆', name: '다이아', color: 'red' },
            { symbol: '♥', name: '하트', color: 'red' },
            { symbol: '♣', name: '클로버', color: 'black' }
        ];
        let currentSuitIdx = 0;

        function getDelay() { return parseInt(document.getElementById('speedRange').value); }

        function changeSpeed() {
            const delay = getDelay();
            const textEl = document.getElementById('speedVal');
            if(delay >= 1200) textEl.innerText = `느리게 (${delay}ms)`;
            else if(delay >= 750) textEl.innerText = `기본 (${delay}ms)`;
            else textEl.innerText = `빠르게 (${delay}ms)`;
            
            document.documentElement.style.setProperty('--speed', `${delay * 0.65}ms`);
        }

        function updateSuitButtons() {
            const area = document.getElementById('suitBtnArea');
            area.innerHTML = `<span class="text-xs font-bold text-slate-500 mr-1">카드 모양:</span>`;
            
            suits.forEach((s, idx) => {
                const btn = document.createElement('button');
                btn.onclick = () => selectSuit(idx);
                
                let baseClass = "suit-btn px-3 py-1 rounded-lg font-extrabold text-sm shadow-sm ";
                if (idx === currentSuitIdx) {
                    if (s.color === 'black') baseClass += "bg-slate-900 text-white border-slate-900 scale-105";
                    else baseClass += "bg-red-600 text-white border-red-600 scale-105";
                } else {
                    baseClass += "bg-white border-slate-200 ";
                    baseClass += (s.color === 'red') ? "text-red-500" : "text-slate-800";
                }
                btn.className = baseClass;
                btn.innerText = `${s.symbol}`;
                area.appendChild(btn);
            });
        }

        function selectSuit(idx) {
            if (isRunning) return;
            currentSuitIdx = idx;
            updateSuitButtons();
            resetStage();
        }

        function checkPause() {
            if (!isPaused) return Promise.resolve();
            return new Promise(resolve => { pauseResolve = resolve; });
        }

        document.getElementById('customNumbers').addEventListener('input', () => {
            if (!isRunning) resetStage();
        });

        /* 💡 개별 로그 항목 생성 시 font-mono 클래스 제거 및 가독성 패딩 최적화 */
        function addLog(html, type = '') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `mb-1.5 pb-1 border-b border-slate-50 text-slate-700 text-xs tracking-tight leading-relaxed ${type}`;
            entry.innerHTML = html;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function refreshScoreboard() {
            document.getElementById('totalCompScore').innerText = globalComp;
            document.getElementById('totalMoveScore').innerText = globalMove;
        }

        /* 하단 표 테이블 단계 텍스트 매핑 및 데이터 색상 다르게 표시 기능 구현 */
        function updateAnalysisTable(stageType, roundNum, data, comp, move, insertionPos = -1) {
            const body = document.getElementById('analysisBody');
            const tr = document.createElement('tr');
            
            let tagHtml = '';
            let sortedCount = 0; 

            if (stageType === 'init') {
                tagHtml = `<span class="step-tag init">초기상태</span>`;
                sortedCount = 1; 
            } else if (stageType === 'final') {
                tagHtml = `<span class="step-tag final">최종단계</span>`;
                sortedCount = data.length; 
            } else {
                tagHtml = `<span class="step-tag">${roundNum}단계</span>`;
                sortedCount = roundNum + 1; 
            }

            const rowDataHtml = data.map((v, idx) => {
                if (stageType !== 'init' && idx === insertionPos) {
                    return `<span class="text-red-500 font-extrabold text-sm mx-0.5 underline decoration-2">${v}</span>`;
                }
                if (idx < sortedCount) {
                    return `<span class="text-blue-600 font-extrabold text-sm mx-0.5">${v}</span>`;
                }
                return `<span class="text-slate-400 mx-0.5">${v}</span>`;
            }).join(', ');

            const compDisplay = `${comp}회 <span class="text-slate-400 text-[11px]">(${globalComp})</span>`;
            const moveDisplay = `${move}회 <span class="text-slate-400 text-[11px]">(${globalMove})</span>`;

            tr.innerHTML = `
                <td>${tagHtml}</td>
                <td class="font-bold text-slate-700">[ ${rowDataHtml} ]</td>
                <td class="text-amber-600 font-bold">${compDisplay}</td>
                <td class="text-blue-600 font-bold">${moveDisplay}</td>
            `;
            body.prepend(tr);
        }

        function parseInputNumbers() {
            const inputVal = document.getElementById('customNumbers').value;
            const errEl = document.getElementById('errorMsg');
            
            let tokens = inputVal.split(/[\s,]+/).filter(t => t.trim() !== "");
            let nums = tokens.map(t => parseInt(t)).filter(n => !isNaN(n));
            
            let uniqueSet = new Set(nums);
            if (uniqueSet.size !== nums.length) {
                errEl.classList.remove('hidden');
                return null;
            } else {
                errEl.classList.add('hidden');
            }
            return nums;
        }

        function resetStage() {
            const stage = document.getElementById('stage');
            stage.innerHTML = '';
            cardElements = [];
            
            let nums = parseInputNumbers();
            if (!nums || nums.length === 0) return;

            const count = nums.length;
            const totalWidth = stage.offsetWidth;
            gap = Math.min(95, (totalWidth - 100) / count);
            startX = (totalWidth - (gap * (count - 1) + 70)) / 2;

            const suitObj = suits[currentSuitIdx];
            const colorClass = suitObj.color === 'black' ? 'theme-black' : 'theme-red';

            nums.forEach((val, i) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.style.left = `${startX + (i * gap)}px`;
                stage.appendChild(slot);

                const card = document.createElement('div');
                card.className = `card-visual ${colorClass}`;
                card.style.left = `${startX + (i * gap)}px`;
                card.innerHTML = `
                    <div class="card-suit text-left w-full">${suitObj.symbol}</div>
                    <div class="card-val">${val}</div>
                    <div class="card-suit text-right w-full" style="transform: rotate(180deg)">${suitObj.symbol}</div>
                `;
                stage.appendChild(card);
                cardElements.push({ val, el: card });
            });
        }

        function handlePause() {
            if (!isRunning || isPaused) return;
            isPaused = true;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('startBtn').innerText = '다시 시작';
            document.getElementById('startBtn').disabled = false;
            addLog('🛑 <b>정렬 일시정지</b>', 'text-amber-600 font-bold');
        }

        function handleReset() {
            isRunning = false;
            isPaused = false;
            if (pauseResolve) {
                pauseResolve();
                pauseResolve = null;
            }
            globalComp = 0;
            globalMove = 0;

            refreshScoreboard();
            document.getElementById('startBtn').innerText = '시작';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('customNumbers').disabled = false;
            document.getElementById('analysisBody').innerHTML = '';
            resetStage();
            document.getElementById('logBox').innerHTML = '<div class="text-slate-400 font-bold italic">전체 보드가 리셋되었습니다.</div>';
        }

        async function handleStart() {
            if (isRunning && isPaused) {
                isPaused = false;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                addLog('▶️ <b>정렬 재개</b>', 'text-emerald-600 font-bold');
                if (pauseResolve) pauseResolve();
                return;
            }

            let nums = parseInputNumbers();
            if (!nums || nums.length === 0) {
                alert("중복 없는 데이터를 입력해 주세요.");
                return;
            }

            if (isRunning) return;
            isRunning = true;
            isPaused = false;
            globalComp = 0;
            globalMove = 0;
            
            refreshScoreboard();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('customNumbers').disabled = true;
            document.getElementById('analysisBody').innerHTML = '';
            
            document.getElementById('logBox').innerHTML = '<div class="font-extrabold text-slate-900 text-sm">🚀 시뮬레이션 시작</div>';
            
            updateAnalysisTable('init', 0, cardElements.map(c => c.val), 0, 0);
            cardElements[0].el.classList.add('sorted');
            
            await new Promise(r => setTimeout(r, 600));
            await insertionSort();
            
            if (isRunning) {
                cardElements.forEach(c => c.el.className = 'card-visual sorted');
                addLog('🎊 <b>정렬 완료!</b>', 'font-black text-sm text-emerald-600');
                isRunning = false;
                document.getElementById('startBtn').innerText = '시작';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('customNumbers').disabled = false;
            }
        }

        async function insertionSort() {
            const n = cardElements.length;
            for (let i = 1; i < n; i++) {
                await checkPause(); if (!isRunning) return;

                // 회차가 시작할 때 "📂 [제 X단계]" 추가 (글자 굵게 강조 및 동일 글꼴 매핑)
                addLog(`📂 <b>[제 ${i}단계]</b>`, 'mt-3 mb-1 text-slate-900 text-[13px] font-extrabold border-t border-slate-100 pt-2');

                let keyObj = cardElements[i];
                let keyVal = keyObj.val;
                
                keyObj.el.classList.add('key-card');
                addLog(`🃏 기준 카드 선택: [${keyVal}]`, 'text-amber-600 font-bold');
                await new Promise(r => setTimeout(r, getDelay() * 0.65));

                let j = i - 1;
                let stepComp = 0;
                let stepMove = 0;

                while (j >= 0) {
                    await checkPause(); if (!isRunning) return;
                    
                    let compObj = cardElements[j];
                    compObj.el.classList.add('comparing');
                    
                    stepComp++; globalComp++; refreshScoreboard();
                    addLog(`👀 비교: [${compObj.val}] vs [${keyVal}]`);
                    await new Promise(r => setTimeout(r, getDelay() * 0.55));

                    if (compObj.val > keyVal) {
                        compObj.el.classList.remove('comparing');
                        compObj.el.classList.add('shifting');
                        
                        addLog(`🔄 위치 이동: [${compObj.val}] > [${keyVal}] 이므로 한 칸 밀기`);
                        
                        await new Promise(resolve => requestAnimationFrame(() => {
                            compObj.el.style.left = `${startX + ((j + 1) * gap)}px`;
                            resolve();
                        }));
                        
                        cardElements[j + 1] = compObj;
                        stepMove++; globalMove++; refreshScoreboard();
                        
                        await new Promise(r => setTimeout(r, getDelay() * 0.55));
                        compObj.el.classList.remove('shifting');
                        j--;
                    } else {
                        compObj.el.classList.remove('comparing');
                        break;
                    }
                }

                await checkPause(); if (!isRunning) return;
                cardElements[j + 1] = keyObj;
                
                await new Promise(resolve => requestAnimationFrame(() => {
                    keyObj.el.style.left = `${startX + ((j + 1) * gap)}px`;
                    resolve();
                }));
                addLog(`📥 카드 삽입: 빈 위치에 [${keyVal}] 삽입`, 'text-slate-900 font-bold');
                
                await new Promise(r => setTimeout(r, getDelay() * 0.55));
                keyObj.el.classList.remove('key-card');

                // 무대 위 카드들의 누적 정렬 완료 상태 동기화 (연한 초록색 반영)
                for (let k = 0; k <= i; k++) { if(cardElements[k]) cardElements[k].el.className = 'card-visual sorted'; }
                
                let type = (i === n - 1) ? 'final' : 'normal';
                updateAnalysisTable(type, i, cardElements.map(c => c.val), stepComp, stepMove, j + 1);
                
                await new Promise(r => setTimeout(r, getDelay() * 0.45));
            }
        }

        window.onload = () => { updateSuitButtons(); changeSpeed(); resetStage(); };
        window.onresize = resetStage;
    </script>
</body>
</html>
